name: Release

on:
  pull_request:
    branches:
      - master
    types:
      - closed

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event.pull_request.merged == true
    outputs:
      new: ${{ steps.release.outputs.new }}
      has_changesets: ${{ steps.check.outputs.has_changesets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Check for changesets
        id: check
        run: |
          if [ ! -d ".changeset" ]; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No .changeset directory, skipping release"
            exit 0
          fi

          CHANGESETS=$(find .changeset -maxdepth 1 -name "*.md" ! -name "README.md" 2>/dev/null || true)
          if [ -z "$CHANGESETS" ]; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No changesets found, skipping release"
          else
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found changesets:"
            echo "$CHANGESETS"
          fi

      - uses: cachix/install-nix-action@v27
        if: steps.check.outputs.has_changesets == 'true'
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup SSH deploy key
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Configure Git
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin git@github.com:fulsomenko/kanban.git

      # bump-version reads changesets, aggregate-changelog reads then deletes them.
      # These two steps must run in this order.
      - name: Bump version from changesets
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          nix develop --command bump-version

      - name: Aggregate changelog
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          nix develop --command aggregate-changelog "${{ github.event.pull_request.number }}"

      - name: Commit release changes
        if: steps.check.outputs.has_changesets == 'true'
        id: release
        run: |
          NEW_VERSION=$(grep -m1 'version = ' Cargo.toml | cut -d'"' -f2)
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $NEW_VERSION"
          git add .
          git commit -m "chore: release v${NEW_VERSION}"

      - name: Validate release build
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          nix develop --command validate-release

      - name: Push release commit
        if: steps.check.outputs.has_changesets == 'true'
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
        run: |
          git push origin master

      - name: Publish to crates.io
        if: steps.check.outputs.has_changesets == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          echo "Publishing to crates.io..."
          nix run .#publish-crates
          echo "Published successfully"

      - name: Tag version
        if: steps.check.outputs.has_changesets == 'true'
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
          TAG: v${{ steps.release.outputs.new }}
        run: |
          set -euo pipefail
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally, skipping git tag"
          else
            git tag "$TAG"
          fi
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin, skipping git push"
          else
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.has_changesets == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release.outputs.new }}
          generate_release_notes: true

      - name: Update PKGBUILD version and sha256
        if: steps.check.outputs.has_changesets == 'true'
        env:
          VERSION: ${{ steps.release.outputs.new }}
        run: |
          set -euo pipefail
          URL="https://github.com/fulsomenko/kanban/archive/v${VERSION}.tar.gz"
          SHA256=$(curl -fsL "$URL" | sha256sum | cut -d' ' -f1)
          sed -i "s|^pkgver=.*|pkgver=${VERSION}|" ./aur/PKGBUILD
          sed -i "s|^pkgrel=.*|pkgrel=1|" ./aur/PKGBUILD
          sed -i "s|sha256sums=.*|sha256sums=(\"${SHA256}\")|" ./aur/PKGBUILD

      - name: Generate .SRCINFO
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          nix shell nixpkgs#pacman -c sh -c '
            PACMAN_ROOT="$(dirname "$(dirname "$(command -v makepkg)")")"
            export MAKEPKG_CONF="$PACMAN_ROOT/etc/makepkg.conf"
            cd aur && makepkg --printsrcinfo > .SRCINFO
          '

      - name: Commit and push AUR files
        if: steps.check.outputs.has_changesets == 'true'
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
        run: |
          git add aur/PKGBUILD aur/.SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update AUR package to v${{ steps.release.outputs.new }}"
            git push origin master
          fi

      - name: Deploy to AUR
        if: steps.check.outputs.has_changesets == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7
        with:
          pkgname: kanban
          pkgbuild: ./aur/PKGBUILD
          commit_username: github-actions[bot]
          commit_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "Update to v${{ steps.release.outputs.new }}"
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          updpkgsums: false
          allow_empty_commits: false

      - name: Compute upstream tarball SHA256 for Homebrew
        if: steps.check.outputs.has_changesets == 'true'
        id: brew-sha
        env:
          VERSION: ${{ steps.release.outputs.new }}
        run: |
          set -euo pipefail
          URL="https://github.com/fulsomenko/kanban/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -fsL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Setup Homebrew tap SSH key
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}" > ~/.ssh/homebrew_tap_key
          chmod 600 ~/.ssh/homebrew_tap_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Bump formula in homebrew-tap
        if: steps.check.outputs.has_changesets == 'true'
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/homebrew_tap_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
          VERSION: ${{ steps.release.outputs.new }}
          SHA: ${{ steps.brew-sha.outputs.sha256 }}
          URL: ${{ steps.brew-sha.outputs.url }}
        run: |
          set -euo pipefail
          git clone git@github.com:fulsomenko/homebrew-tap.git /tmp/homebrew-tap
          sed -i "s|^  url \".*\"|  url \"${URL}\"|" /tmp/homebrew-tap/Formula/kanban.rb
          sed -i "s|^  sha256 \".*\"|  sha256 \"${SHA}\"|" /tmp/homebrew-tap/Formula/kanban.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/kanban.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "kanban ${VERSION}"
            git push origin master
          fi

      - name: Sync develop with master
        if: steps.check.outputs.has_changesets == 'true'
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
        run: |
          git checkout develop
          git pull origin develop
          if ! git merge origin/master --no-edit; then
            echo "::warning::Failed to auto-merge master into develop. Manual merge required."
            git merge --abort
            exit 0
          fi
          git push origin develop

  build-windows:
    name: Build Windows release archive
    needs: [release]
    if: needs.release.outputs.has_changesets == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Build kanban + kanban-mcp (release)
        shell: pwsh
        run: |
          cargo build --release `
            --package kanban-cli `
            --package kanban-mcp `
            --target x86_64-pc-windows-msvc

      - name: Stage archive contents
        shell: pwsh
        env:
          VERSION: ${{ needs.release.outputs.new }}
        run: |
          $stage = "stage/kanban-v$env:VERSION-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/kanban.exe     $stage/
          Copy-Item target/x86_64-pc-windows-msvc/release/kanban-mcp.exe $stage/
          Copy-Item LICENSE.md $stage/
          Copy-Item README.md  $stage/
          & "$stage/kanban.exe" --version
          & "$stage/kanban-mcp.exe" --version

      - name: Compress archive
        shell: pwsh
        env:
          VERSION: ${{ needs.release.outputs.new }}
        run: |
          $name = "kanban-v$env:VERSION-x86_64-pc-windows-msvc"
          Compress-Archive -Path "stage/$name/*" -DestinationPath "$name.zip" -Force

      - name: Write SHA256SUMS
        shell: pwsh
        env:
          VERSION: ${{ needs.release.outputs.new }}
        run: |
          $name = "kanban-v$env:VERSION-x86_64-pc-windows-msvc.zip"
          $sha  = (Get-FileHash -Algorithm SHA256 $name).Hash.ToLower()
          "$sha  $name" | Out-File -Encoding ascii -FilePath SHA256SUMS

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.new }}
          files: |
            kanban-v${{ needs.release.outputs.new }}-x86_64-pc-windows-msvc.zip
            SHA256SUMS
          fail_on_unmatched_files: true

  publish-chocolatey:
    name: Publish to Chocolatey
    needs: [release, build-windows]
    if: needs.release.outputs.has_changesets == 'true'
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new }}

      - name: Read Windows ZIP digest from GitHub Release
        id: sha
        shell: pwsh
        env:
          VERSION: ${{ needs.release.outputs.new }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          $asset = "kanban-v$env:VERSION-x86_64-pc-windows-msvc.zip"
          $ok = $false
          for ($i = 1; $i -le 30; $i++) {
            $json = gh release view "v$env:VERSION" --repo $env:REPO `
              --json assets --jq ".assets[] | select(.name == `"$asset`")" 2>$null
            if ($json) {
              $obj = $json | ConvertFrom-Json
              if ($obj.state -eq 'uploaded' -and $obj.digest) {
                $sha = $obj.digest -replace '^sha256:', ''
                Write-Output "Found $asset: sha=$sha"
                "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
                $ok = $true
                break
              }
              Write-Output ("Attempt {0}: state='{1}' digest='{2}'" -f $i, $obj.state, $obj.digest)
            } else {
              Write-Output ("Attempt {0}: asset not yet listed" -f $i)
            }
            Start-Sleep -Seconds 5
          }
          if (-not $ok) {
            Write-Error "Release asset never became ready after 30 attempts (~150s)"
            exit 1
          }

      - name: Stage Chocolatey package with substitutions
        shell: pwsh
        env:
          VERSION: ${{ needs.release.outputs.new }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          $build = "build/chocolatey"
          New-Item -ItemType Directory -Path "$build/tools" -Force | Out-Null
          Copy-Item packaging/chocolatey/kanban.nuspec $build/kanban.nuspec
          Copy-Item packaging/chocolatey/tools/* $build/tools/ -Recurse
          Copy-Item LICENSE.md $build/tools/LICENSE.txt -Force

          (Get-Content "$build/kanban.nuspec") `
            -replace '\$version\$', $env:VERSION `
            | Set-Content "$build/kanban.nuspec"

          (Get-Content "$build/tools/chocolateyinstall.ps1") `
            -replace '\$version\$',   $env:VERSION `
            -replace '\$checksum64\$', $env:SHA `
            | Set-Content "$build/tools/chocolateyinstall.ps1"

      - name: choco pack
        shell: pwsh
        working-directory: build/chocolatey
        run: choco pack

      - name: Smoke install from local nupkg
        shell: pwsh
        working-directory: build/chocolatey
        run: |
          choco install kanban -s . -y --force --no-progress
          kanban --version
          kanban-mcp --version

      - name: choco push
        shell: pwsh
        working-directory: build/chocolatey
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
          VERSION: ${{ needs.release.outputs.new }}
        run: |
          # Pre-check: if this version is already published and approved,
          # treat as success. This makes the job safe to re-run after a
          # transient workflow failure that followed a successful push.
          # NB: Submitted/Waiting-for-Reviewer states are NOT visible via
          # the public v2 OData API, so a 404 here does not prove the
          # package is unpublished — see packaging/chocolatey/RECOVERY.md.
          $checkUrl = "https://community.chocolatey.org/api/v2/Packages(Id='kanban',Version='$env:VERSION')"
          try {
            $null = Invoke-RestMethod -Uri $checkUrl -TimeoutSec 30 -ErrorAction Stop
            Write-Output "kanban $env:VERSION is already published on Chocolatey; nothing to do."
            exit 0
          } catch {
            $status = if ($_.Exception.Response) { [int]$_.Exception.Response.StatusCode } else { 0 }
            if ($status -ne 404) {
              Write-Output ("Pre-check returned status {0} ({1}); proceeding to push anyway." -f $status, $_.Exception.Message)
            }
          }

          try {
            choco push "kanban.$env:VERSION.nupkg" `
              --api-key="$env:CHOCO_API_KEY" `
              --source="https://push.chocolatey.org/"
            if ($LASTEXITCODE -ne 0) { throw "choco push exited $LASTEXITCODE" }
          } catch {
            Write-Output ""
            Write-Output "=== Chocolatey publish failed ==="
            Write-Output "Recovery runbook: packaging/chocolatey/RECOVERY.md"
            Write-Output "Chocolatey rejects re-push of the same id+version permanently."
            Write-Output "Do NOT simply re-run this job before diagnosing — see the runbook."
            Write-Output "================================="
            throw
          }

      - name: Note moderation expectations
        shell: pwsh
        env:
          VERSION: ${{ needs.release.outputs.new }}
        run: |
          Write-Output "==="
          Write-Output "Pushed kanban v$env:VERSION to community.chocolatey.org."
          Write-Output "First-time moderation typically takes 1-7 days."
          Write-Output "Status:"
          Write-Output "  https://community.chocolatey.org/packages/kanban/$env:VERSION"
          Write-Output "==="
